<!DOCTYPE html>

<head>
    <title>{% block title %} {% endblock %}</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        form { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-width: 400px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<nav>
    <a href="/">Главная</a> <br>
    <a href="{{ url_for('feedback') }}">Оставить отзыв</a> <br>
    <a href="{{  url_for('register') }}">Registration</a> <br>
    <a href="{{  url_for('todo') }}">Список дел</a> <br>
    <a href="{{ url_for('register_acc') }}">Зарегистрироваться</a> <br>
    <a href="{{  url_for('admin') }}">Админка</a> <br>
    <a href="{{  url_for('IMT') }}">ИМТ рассчитать</a> <br>
</nav>
{% block content %} {% endblock %}
</body>
